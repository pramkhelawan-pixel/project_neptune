name: project_neptune
description: "Project Neptune - Professional Angling Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^16.3.0

  # Backend
  supabase_flutter: ^2.16.0

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7

  # Local Storage
  shared_preferences: ^2.5.3

  # Connectivity
  connectivity_plus: ^7.0.0

  # Location
  geolocator: ^14.0.2

  # Maps
  flutter_map: ^8.2.1
  latlong2: ^0.9.1

  # Images
  image_picker: ^1.2.0

  # Permissions
  permission_handler: ^12.0.1

  # Logging
  logger: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - .env